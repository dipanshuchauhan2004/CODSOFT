<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tic Tac Toe AI</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <div class="container">

        <header>

            <h1>Tic Tac Toe AI</h1>

            <p>Human vs Unbeatable AI (Minimax Algorithm)</p>

        </header>

        <div class="scoreboard">

            <div class="score">

                <h3>You (X)</h3>

                <span id="playerScore">0</span>

            </div>

            <div class="score">

                <h3>Draw</h3>

                <span id="drawScore">0</span>

            </div>

            <div class="score">

                <h3>AI (O)</h3>

                <span id="aiScore">0</span>

            </div>

        </div>

        <div class="game-info">

            <h2 id="status">Your Turn</h2>

        </div>

        <div class="board" id="board">

            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>

            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>

            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>

        </div>

        <div class="controls">

            <button id="restartBtn">

                Restart Game

            </button>

            <button id="newGameBtn">

                New Match

            </button>

        </div>

        <div class="difficulty">

            <label>

                Difficulty

            </label>

            <select id="difficulty">

                <option value="easy">Easy</option>

                <option value="medium">Medium</option>

                <option value="hard" selected>Hard (Minimax)</option>

            </select>

        </div>

        <footer>

            <p>

                MCA Internship Project

                <br>

                AI Powered Tic Tac Toe

            </p>

        </footer>

    </div>

    <script src="js/utils.js"></script>

    <script src="js/minimax.js"></script>

    <script src="js/ai.js"></script>

    <script src="js/game.js"></script>

    <script src="js/ui.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
