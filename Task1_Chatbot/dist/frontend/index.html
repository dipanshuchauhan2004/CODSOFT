<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Rule-Based Chatbot</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/responsive.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <div class="container">

        <!-- Header -->

        <header>

            <div class="logo">

                🤖

            </div>

            <div>

                <h1>AI Rule-Based Chatbot</h1>

                <p class="status">

                    ● Online

                </p>

            </div>

        </header>

        <!-- Chat Area -->

        <main id="chatBox">

            <div class="message bot">

                <div class="avatar">

                    🤖

                </div>

                <div class="bubble">

                    <h4>AI Assistant</h4>

                    <p>

                        Hello 👋

                        <br><br>

                        Welcome to the AI Rule-Based Chatbot.

                        <br><br>

                        Ask me about Python, Java, AI, greetings, or general questions.

                    </p>

                    <span class="time">Now</span>

                </div>

            </div>

        </main>

        <!-- Typing Indicator -->

        <div id="typing" class="typing hidden">

            🤖 AI is typing...

        </div>

        <!-- Input Area -->

        <div class="input-area">

            <input
                type="text"
                id="userInput"
                placeholder="Type your message..."
                autocomplete="off"
            >

            <button id="sendBtn">

                Send

            </button>

        </div>

        <!-- Bottom Buttons -->

        <div class="bottom-buttons">

            <button id="clearBtn">

                Clear Chat

            </button>

            <button id="saveBtn">

                Save Chat

            </button>

        </div>

        <!-- Footer -->

        <footer>

            MCA Internship Project

            <br>

            Rule-Based AI Chatbot using Python

        </footer>

    </div>

    <script src="js/ui.js"></script>

    <script src="js/chatbot.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
